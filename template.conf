###############################################
# An Example Request Router Configuration File
###############################################

# --------------------------------------------------------------------------------------------
# Definition        : connection
# Description       : Each [[connection]] section defines a single backend server that makes up a service.
# Required          : Yes (at least one [[connection]] must be defined)
# --------------------------------------------------------------------------------------------
[[connection]]

    # Name of the server connection.
    #   Required        : Yes
    #   Type            : String
    #   Notes           :
    #       - This value is used to reference the connection in a [[service]] "members" section.
    #       - The name value should be unique across all entities in the configuration file.
    name = "example_connection_1"

    # URL location of the server connection.
    #   Required        : Yes
    #   Type            : String
    #   Notes           :
    #       - The address should include the protocol, hostname, and port number.
    location = "http://connection_address_1:8080"

    # Endpoint path for making ping requests to the server connection.
    #   Required        : No
    #   Type            : String
    #   Default         : "/ping"
    #   Notes           :
    #       - The path should be relative to the "location" address.
    ping-endpoint = "/ping"

    # Timeout duration for requests made to the server connection.
    #   Required        : No
    #   Type            : String
    #   Default         : "10s"
    #   Notes           :
    #       - The timeout value should be a string that can be parsed by Go's time.ParseDuration() function.
    timeout = "10s"

    # The client certificate and key files for making secure requests to the server connection.
    #   Required        : No
    #   Type            : String
    #   Default         : "" (disabled)
    #   Notes           :
    #       - The client certificate and key should be absolute paths to the relevant files.
    client-cert = ""
    client-key = ""

# Repeat the above [[connection]] section for each connection that you wish to route requests to.

[[connection]]
    name = "example_connection_2"
    location = "http://connection_address_2:8080"
    ping-endpoint = "/health"
    timeout = "10s"

[[connection]]
    name = "example_connection_3"
    location = "http://connection_address_3:8080"
    ping-endpoint = "/health"
    timeout = "10s"

# ...

# --------------------------------------------------------------------------------------------
# Definition        : service
# Description       : Each [[service]] section defines a group of server connections that the router will send requests to.
# Required          : Yes (at least one [[service]] must be defined)
# --------------------------------------------------------------------------------------------
[[service]]

    # Name of the service.
    #   Required        : Yes
    #   Type            : String
    #   Notes           :
    #       - This value is used to reference the service in a [[router.path.target]] "service" and "replica" sections.
    #       - The name value should be unique across all entities in the configuration file.
    name = "example_service_1"

    # A list of server connections (name values) that are part of the service.
    #   Required        : Yes
    #   Type            : Array of Strings
    #   Notes           :
    #       - The values should match the name values of relevant [[connection]] sections.
    members = ["example_connection_1"]

# Repeat the above [[service]] section for each service that you wish to route requests to.

[[service]]
    name = "example_service_2"
    members = ["example_connection_2", "example_connection_3"]

[[service]]
    name = "example_service_3"
    members = ["example_connection_3"]

# ...

# --------------------------------------------------------------------------------------------
# Definition        : router
# Description       : Each [[router]] section defines a single router that the service will listen and route requests with.
# Required          : Yes (at least one [[router]] must be defined)
# --------------------------------------------------------------------------------------------
[[router]]

    # The address and port number that the router will bind and listen to.
    #   Required        : Yes
    #   Type            : String
    #   Notes           :
    #       - The address value should be unique across all [[router]] definitions.
    bind = "0.0.0.0:9096"

    # The access log file for the router.
    #   Required        : No
    #   Type            : String
    #   Default         : "" (no log file written)
    #   Notes           :
    #       - The log file can be an absolute or relative path. Use the "-log-dir=" flag to specify the directory for relative paths.
    access-log = "router_access.log"

    # The TLS certificate and key used for secure (HTTPS) connections.
    #   Required        : No
    #   Type            : String
    #   Default         : "" (disabled)
    #   Notes           :
    #       - The server certificate and key should be absolute paths to the relevant files.
    tls-cert = ""
    tls-key = ""

    # Enable unencrypted HTTP/2 (h2c) if you wish to support HTTP/2 without TLS.
    #   Required        : No
    #   Type            : Boolean
    #   Default         : false
    #   Notes           :
    #       - h2c is not supported by most browsers, but may be used by trusted clients.
    force-h2c = false

    # --------------------------------------------------------------------------------------------
    # Definition        : router.path
    # Description       : Each [[router.path]] section defines a single path that a router will match requests against.
    # Required          : Yes (at least one [[router.path]] must be defined for each [[router]])
    # --------------------------------------------------------------------------------------------
    [[router.path]]

        # Name of the router path.
        #   Required        : Yes
        #   Type            : String
        #   Notes           :
        #       - The name value should be unique across all entities in the configuration file.
        name = "example_path_1"

        # The HTTP methods that the router will accept requests with for this path.
        #   Required        : Yes
        #   Type            : Array of Strings
        #   Notes           : 
        #       - Router paths are matched using a combination of "incoming-endpoint" and HTTP "method".
        #       - The methods should be valid HTTP methods (e.g. GET, POST, PUT, DELETE, etc).
        methods = ["POST"]

        # The URI endpoint path that the router will listen to incoming requests for.
        #   Required        : Yes
        #   Type            : String
        #   Notes           :
        #       - Router paths are matched using a combination of "incoming-endpoint" and HTTP "method".
        #       - Multiple [[router.path]] definitions can share the same "incoming-endpoint", as long as they do not have an overlapping "method".
        incoming-endpoint = "/write"

        # --------------------------------------------------------------------------------------------
        # Definition        : router.path.target
        # Description       : Each [[router.path.target]] section defines a single target that a router path will route requests to.
        # Required          : Yes (at least one [[router.path.target]] must be defined for each [[router.path]])
        # --------------------------------------------------------------------------------------------
        [[router.path.target]]

            # Name of the target.
            #   Required        : Yes
            #   Type            : String
            #   Notes           :
            #       - The name value should be unique across all entities in the configuration file.
            name = "example_target_1"

            # The service that the target will route requests to.
            #   Required        : Yes
            #   Type            : String
            #   Notes           :
            #       - The value should match the name value of a relevant [[service]] section.
            #       - Request responses will be returned to the client based on the target's "request-strategy" value.
            service = "example_service_1"

            # The service that the target will replicate requests to.
            #   Required        : No
            #   Type            : String
            #   Default         : "" (disabled)
            #   Notes           :
            #       - The value should match the name value of a relevant [[service]] section.
            #       - Replicas receive copies of the request in parallel, but do not affect the response seen by the client.
            replica = "example_service_3"

            # The URI endpoint path that the router will use for forwarded requests to the upstream "service" and "replica".
            #   Required        : No
            #   Type            : String
            #   Default         : Value of parent "incoming-endpoint"
            upstream-endpoint = "/api/v1/write"

            # The request action to take when this target is selected (e.g. its filters match).
            #   Required        : No
            #   Type            : String
            #   Default         : "forward"
            #   Options         :
            #       - forward       : the service is currently active and healthy.
            #                           - requests are forwarded to the service, and responses are propagated to the client.
            #                           - requests will be forwarded to the target's replica service, if defined.
            #       - reject        : the service is currently inactive, and requests will NOT be forwarded to the service.
            #                           - the router will return a "503 Service Unavailable" response to client requests.
            #                           - requests will NOT be forwarded to the target's replica service, if defined.
            #       - simulate      : the service is currently inactive, but responses are mimicked to be successful where possible.
            #                           - the router will return a "204 No Content" response to client requests, despite the request NOT being forwarded to the service.
            #                           - requests will NOT be forwarded to the target's replica service, if defined.
            #       - offload       : the service is currently inactive, but responses are mimicked to be successful where possible.
            #                           - the router will return a "204 No Content" response to client requests, despite the request NOT being forwarded to the service.
            #                           - requests will be forwarded to the target's replica service, if defined.
            request-action = "forward"

            # The request strategy for how the target will route requests to the "service" when forwarding.
            #   Required        : No
            #   Type            : String
            #   Default         : "highest"
            #   Options         :
            #       - ping          : a ping request is made to all service members and the fastest connection to respond successfully is used for the request.
            #       - sequence      : requests are made in sequence to all service members until a successful response is received, which is then returned to the client, else the highest response code is returned.
            #       - primary       : requests are made in parallel to all service members and only the response from the primary member (first in the members list) is returned to the client.
            #       - success       : requests are made in parallel to all service members and only the first successful response is returned to the client.
            #       - highest       : requests are made in parallel to all service members and the request with the highest response code is returned to the client (e.g. 400 > 204).
            request-strategy = "highest"

            # The filter strategy for how the target's filters will be combined.
            #   Required        : Yes
            #   Type            : String
            #   Default         : "" (filters are ignored)
            #   Options         :
            #       - any           : the target will be considered a match if any filters match.
            #       - all           : the target will be considered a match if all filters match.
            filter-strategy = "any"

            # The log file for the target.
            #   Required        : No
            #   Type            : String
            #   Default         : "" (no log file written)
            #   Notes           :
            #       - The log file can be an absolute or relative path. Use the "--log-dir=" flag to specify the directory for relative paths.
            log-file = "example_target_1.log"

            # --------------------------------------------------------------------------------------------
            # Definition        : router.path.target.header-override
            # Description       : Each [[router.path.target.header-override]] section defines a header override for a target.
            # Required          : No (a target does not require any header overrides)
            # Notes             : 
            #     - Header overrides are applied after a target's filters have been evaluated and matched.
            #     - A header override will be set on requests made to the target's defined "service" and "replica".
            # --------------------------------------------------------------------------------------------
            [[router.path.target.header-override]]

                # The key of the header to override.
                #   Required        : Yes
                #   Type            : String
                key = "example-header-1"

                # The value of the header to override.
                #   Required        : Yes
                #   Type            : String
                #   Notes           :
                #       - The value can be an empty string to remove the header from the request.
                value = "example-value-1"

            # Repeat the above [[router.path.target.header-override]] section for each header that you wish to override for the target.

            [[router.path.target.header-override]]
                key = "example-header-2"
                value = ""

            # ...

            # --------------------------------------------------------------------------------------------
            # Definition        : router.path.target.request-filter
            # Description       : Each [[router.path.target.request-filter]] section defines a filter for a target.
            # Required          : No (a target does not require any filters)
            # Notes             :
            #     - Filters are evaluated before header overrides are applied.
            #     - A target will be considered a match if the filters match based on the defined "filter-strategy" value.
            #     - Filters are ignored if the "filter-strategy" is not defined or is set to an empty string.
            # --------------------------------------------------------------------------------------------
            [[router.path.target.request-filter]]

                # The source from which the filter will be evaluated.
                #   Required        : Yes
                #   Type            : String
                #   Options         :
                #       - headers       : the filter will extract a value from the request headers.
                #       - query         : the filter will extract a value from the request query parameters.
                source = "headers"

                # The key to extract from the filter source.
                #   Required        : Yes
                #   Type            : String
                key = "username"

                # The regular expression to use to match against the "key" extracted from the request source.
                #   Required        : Yes
                #   Type            : String
                #   Notes           :
                #       - The regular expression should be a valid Go regular expression.
                #       - Anchors (^ and $) are enforced and are automatically added to the start and end of the regular expression.
                match = "user-1"
        
            # Repeat the above [[router.path.target.request-filter]] section for each filter that you wish to configure for the target.

            [[router.path.target.request-filter]]
                source = "query"
                key = "u"
                match = "user-1"

            # ...

        # Repeat the above [[router.path.target]] section for each target that you wish to configure for the path.

        [[router.path.target]]
            name = "example_target_2"
            service = "example_service_2"
            replica = "example_service_3"
            upstream-endpoint = "/api/v1/write"
            request-action = "reject"
            request-strategy = "highest"
            filter-strategy = "any"
            log-file = "example_target_2.log"
            [[router.path.target.request-filter]]
                source = "headers"
                key = "username"
                match = "user-2"
            [[router.path.target.request-filter]]
                source = "query"
                key = "u"
                match = "user-2"

        # ...

    # Repeat the above [[router.path]] section for each path that you wish to configure for the router.

    [[router.path]]
        name = "example_path_2"
        methods = ["GET"]
        incoming-endpoint = "/read"

        [[router.path.target]]
            name = "example_target_3"
            service = "example_service_1"
            replica = "example_service_3"
            request-action = "forward"
            request-strategy = "highest"
            filter-strategy = "any"
            [[router.path.target.request-filter]]
                source = "headers"
                key = "username"
                match = "user-1"
            [[router.path.target.request-filter]]
                source = "query"
                key = "u"
                match = "user-1"

        [[router.path.target]]
            name = "example_target_4"
            service = "example_service_2"
            replica = "example_service_3"
            request-action = "offload"
            request-strategy = "highest"
            filter-strategy = "any"
            [[router.path.target.request-filter]]
                source = "headers"
                key = "username"
                match = "user-2"
            [[router.path.target.request-filter]]
                source = "query"
                key = "u"
                match = "user-2"

        [[router.path.target]]
            name = "example_target_5"
            service = "example_service_3"
            request-action = "reject"
            request-strategy = "ping"
            filter-strategy = "all"
            [[router.path.target.request-filter]]
                source = "headers"
                key = "username"
                match = "user-.*"
            [[router.path.target.request-filter]]
                source = "query"
                key = "u"
                match = "user-.*"

    # ...

# Repeat the above [[router]] section for each router that you wish to configure.

# ...

# --------------------------------------------------------------------------------------------
